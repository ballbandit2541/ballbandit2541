name: Metrics
on:
  # รันทุก 24 ชั่วโมง
  schedule: [{cron: "0 0 * * *"}]
  # หรือรันเองแบบ Manual ผ่านหน้า Actions tab
  workflow_dispatch:
  # รันเมื่อมีการ Push ไปที่ main branch
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ใช้ Token ที่เราตั้งไว้ใน Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # การตั้งค่าพื้นฐาน
          user: ballbandit2541 # ใส่ username ของคุณ
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Bangkok
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"
          
          # ตัวอย่างการเปิด Plugin (ลองเลือกที่ชอบ)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_achievements: yes